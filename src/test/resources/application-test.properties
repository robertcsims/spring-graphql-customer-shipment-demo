# Test profile - use in-memory Derby for fast isolated tests
spring.datasource.url=jdbc:derby:memory:testdb;create=true
spring.datasource.driver-class-name=org.apache.derby.jdbc.EmbeddedDriver
spring.datasource.username=app
spring.datasource.password=app

# Use 'update' instead of create-drop to avoid noisy Derby DDL drop exceptions
# on tables that don't exist yet (common with FK relationships + in-memory DB across test contexts).
# Combined with @Transactional on tests, this provides sufficient isolation without schema drop noise.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.graphql.graphiql.enabled=false

# Open GraphQL endpoint for integration tests (no auth friction)
app.security.demo-mode=true

logging.level.root=WARN
logging.level.com.example.graphql=INFO

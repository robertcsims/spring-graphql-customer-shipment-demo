# Derby compatibility: prevents Hibernate from probing unimplemented JDBC LOB methods (createNClob)
# which causes Hikari to mark connections broken with SQLFeatureNotSupportedException during startup.
# This is a known limitation of embedded Derby vs Hibernate 6.
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


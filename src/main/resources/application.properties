# === Spring for GraphQL ===
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.schema.introspection.enabled=true
spring.graphql.path=/graphql

# === Actuator (exposed for demo professionalism) ===
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# === Demo Mode Flag (used by SecurityConfig) ===
app.security.demo-mode=false

# Clean logging by default
logging.level.root=INFO
logging.level.org.springframework.graphql=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.example.graphql=INFO

# Fallback basic auth (only used when demo-mode=false)

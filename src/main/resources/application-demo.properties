# ============================================
# DEMO PROFILE - Recommended for Sr. Leadership presentations
# Start with: mvn spring-boot:run -Dspring-boot.run.profiles=demo
# or: java -jar ... --spring.profiles.active=demo
# ============================================

# Disable authentication friction so the audience focuses on GraphQL
app.security.demo-mode=true

# Disable built-in GraphiQL (we provide a reliable CDN-based one at /graphiql instead,
# to guarantee it works in the demo environment without registration timing/auto-config issues).
spring.graphql.graphiql.enabled=false
spring.graphql.schema.introspection.enabled=true

# Extremely clean, executive-friendly startup logs
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Suppress noisy but non-actionable framework noise during demo
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.com.zaxxer.hikari=ERROR
logging.level.org.apache.derby=ERROR
logging.level.org.springframework.graphql=INFO
logging.level.com.example.graphql=INFO

# Still use persistent Derby (data survives restarts)
spring.datasource.url=jdbc:derby:./data/derbydb;create=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.DerbyDialect

# Expose health endpoint
management.endpoints.web.exposure.include=health,info

# Derby compatibility (same as main application.properties)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================
# DEMO PROFILE - Recommended for Sr. Leadership presentations
# Start with: mvn spring-boot:run -Dspring-boot.run.profiles=demo
# or: java -jar ... --spring.profiles.active=demo
# ============================================

# Disable authentication friction so the audience focuses on GraphQL
app.security.demo-mode=true

# Keep GraphiQL and introspection on
spring.graphql.graphiql.enabled=true
spring.graphql.schema.introspection.enabled=true

# Cleaner console output for live demo
spring.jpa.show-sql=false
logging.level.root=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.graphql=INFO

# Still use persistent Derby (data survives restarts)
spring.datasource.url=jdbc:derby:./data/derbydb;create=true

# Expose health endpoint
management.endpoints.web.exposure.include=health,info
